name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'client/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          VITE_TRANSPORT: mqtt
          VITE_MQTT_BROKER_WS_URL: ${{ secrets.MQTT_BROKER_WS_URL }}
          VITE_MQTT_USERNAME: ${{ secrets.MQTT_USERNAME }}
          VITE_MQTT_PASSWORD: ${{ secrets.MQTT_PASSWORD }}
          VITE_MQTT_HOME_ID: ${{ secrets.MQTT_HOME_ID }}

      # SPA routing fix: copy index.html to 404.html
      - run: cp ../public-react/index.html ../public-react/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ../public-react

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
